<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Action Potential</title>
<style>
  :root {
    --bg-0: #05070f;
    --bg-1: #0b1022;
    --ink-hi: #f2f5fb;
    --ink-mid: #9fb0ca;
    --ink-low: #58688a;
    --na: #ff7a6b;
    --k: #5cc9ff;
    --protein: #b084ff;
    --atp: #ffd166;
    --amber: #d4a554;
    --accent: #6ee7e5;
    --panel: rgba(255,255,255,0.02);
    --panel-border: rgba(255,255,255,0.06);
    --note-bg: #fdf1c6;
    --note-ink: #2a1e08;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, #0f1630 0%, transparent 70%),
      linear-gradient(180deg, #05070f 0%, #030510 100%);
    background-attachment: fixed;
    color: var(--ink-hi);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  header {
    padding: 14px 32px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    max-width: 1200px;
    margin: 0 auto;
  }
  header .title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-low);
  }
  .step-indicator {
    font-size: 13px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--ink-low);
    letter-spacing: 1px;
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px 20px;
  }
  .handbook-banner {
    margin: 0 auto 14px;
    padding: 9px 18px;
    background: linear-gradient(90deg, rgba(255, 209, 102, 0.08), rgba(110, 231, 229, 0.04));
    border: 1px solid rgba(255, 209, 102, 0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    line-height: 1.4;
    color: #cfc5aa;
  }
  .handbook-banner .hb-tag {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 4px 8px;
    background: rgba(255, 209, 102, 0.18);
    color: #ffd166;
    border-radius: 5px;
  }
  .handbook-banner strong { color: #ffd166; font-weight: 600; }
  .stage {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 22px;
    overflow: hidden;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
  }
  .canvas-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    transition: opacity 300ms ease;
  }
  .phase-bar {
    padding: 16px 28px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
    border-top: 1px solid var(--panel-border);
    background: rgba(5, 8, 20, 0.4);
  }
  .phase-name {
    font-size: 23px;
    font-weight: 700;
    letter-spacing: 0.1px;
    color: var(--accent);
    transition: color 400ms ease;
  }
  .voltage-block {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .graph-wrap {
    width: 320px;
    height: 70px;
    opacity: 1;
    transition: opacity 300ms ease;
  }
  .graph-wrap.hidden { opacity: 0.15; }
  .voltage-readout {
    font-size: 24px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
    color: var(--ink-hi);
    min-width: 100px;
    text-align: right;
    transition: opacity 300ms ease;
  }
  .voltage-readout.hidden { opacity: 0; }
  .content {
    margin-top: 14px;
  }
  .notes-card {
    background: var(--note-bg);
    color: var(--note-ink);
    padding: 14px 22px 12px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.55;
    position: relative;
    box-shadow:
      0 14px 40px rgba(255, 209, 102, 0.08),
      inset 0 0 0 1px rgba(0,0,0,0.02);
  }
  .step-heading {
    font-weight: 700;
    font-size: 16px;
    color: #7a3a00;
    margin-bottom: 4px;
    letter-spacing: 0.2px;
  }
  .notes-card p { margin: 0 0 6px; }
  .notes-card strong { font-weight: 700; color: #2a1e08; }

  /* Phase breakdown interactive widget (summary scene only) */
  .phase-breakdown {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed rgba(122, 86, 0, 0.28);
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .phase-breakdown .pb-head {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7a3a00;
    margin-bottom: 4px;
  }
  .phase-card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    text-align: left;
    padding: 10px 14px;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(122, 58, 0, 0.18);
    border-left: 4px solid var(--pc-color, #ccc);
    border-radius: 8px;
    font-family: inherit;
    color: #2a1e08;
    cursor: pointer;
    transition: background 150ms, border-color 150ms, box-shadow 150ms;
    width: 100%;
  }
  .phase-card:hover { background: rgba(255,255,255,0.78); }
  .phase-card .pc-num {
    font-size: 11px;
    font-weight: 800;
    background: var(--pc-color, #ccc);
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .phase-card .pc-body { flex: 1; min-width: 0; }
  .phase-card .pc-title {
    font-weight: 700;
    font-size: 14px;
    color: #7a3a00;
  }
  .phase-card .pc-reveal {
    font-size: 12px;
    font-style: italic;
    color: #8a6100;
    margin-top: 2px;
  }
  .phase-card .pc-content {
    display: none;
    font-size: 13px;
    line-height: 1.55;
    margin-top: 6px;
    color: #2a1e08;
  }
  .phase-card.revealed {
    background: rgba(255,255,255,0.92);
    border-left-width: 6px;
  }
  .phase-card.revealed .pc-reveal { display: none; }
  .phase-card.revealed .pc-content { display: block; animation: pcFade 250ms ease; }
  @keyframes pcFade { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: translateY(0); } }
  .pb-progress {
    margin-top: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #7a3a00;
  }
  .pb-bar {
    height: 5px;
    background: rgba(122, 58, 0, 0.12);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 5px;
  }
  .pb-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ffd166, #ff7a6b, #b084ff, #5cc9ff, #9aadc8);
    transition: width 300ms ease;
  }
  .pb-text.complete { color: #0f5b3f; }
  .sketch-prompt {
    margin-top: 6px;
    padding-top: 8px;
    border-top: 1px dashed rgba(122, 86, 0, 0.25);
    font-size: 13px;
    font-style: italic;
    color: #8a6100;
  }
  .sketch-prompt .pen { font-style: normal; margin-right: 4px; }
  nav {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 10px 20px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    color: var(--ink-hi);
    cursor: pointer;
    transition: background 150ms, transform 50ms, border-color 150ms;
  }
  button:hover:not(:disabled) {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.15);
  }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button.primary {
    background: linear-gradient(180deg, #6ee7e5 0%, #3dbfc0 100%);
    color: #03252a;
    border-color: rgba(110, 231, 229, 0.4);
    box-shadow: 0 6px 20px rgba(110, 231, 229, 0.25);
  }
  button.primary:hover { filter: brightness(1.08); }
  .btn-group { display: flex; gap: 10px; }
  @media (max-width: 720px) {
    .phase-bar { grid-template-columns: 1fr; }
    .voltage-block { justify-content: space-between; }
    .graph-wrap { width: 200px; }
    .phase-name { font-size: 20px; }
  }
</style>
</head>
<body>
<header>
  <div class="title">Action Potential</div>
  <div class="step-indicator" id="stepIndicator">01 / 10</div>
</header>

<main>
  <div class="handbook-banner">
    <div class="hb-tag">3a. LECTURE</div>
    <div>Follow along in the <strong>3a. Lecture</strong> section of your handbook. For each step: <strong>label it</strong>, <strong>copy the yellow box</strong>, and <strong>draw a simple diagram</strong>. Use <strong>color</strong>.</div>
  </div>
  <div class="stage">
    <canvas id="canvas" width="1600" height="650"></canvas>
    <div class="phase-bar">
      <div class="phase-name" id="phaseName">Step 1: The Pump</div>
      <div class="voltage-block">
        <div class="graph-wrap" id="graphWrap">
          <svg id="minigraph" viewBox="0 0 320 70" style="width:100%; height:100%"></svg>
        </div>
        <div class="voltage-readout" id="voltage">—</div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="notes-card">
      <div class="step-heading" id="stepHeading">Step 1: The Neuron</div>
      <p id="notes"></p>
      <div class="sketch-prompt" id="sketchPrompt"><span class="pen">✎</span>Now sketch what you see above in your notes. Use color where it helps.</div>
    </div>
  </div>

  <nav>
    <button id="resetBtn">Start Over</button>
    <div class="btn-group">
      <button id="prevBtn">← Back</button>
      <button id="nextBtn" class="primary">Next →</button>
    </div>
  </nav>

</main>

<script>
// =====================================================
//  Canvas setup
// =====================================================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const W = canvas.width;   // 1600
const H = canvas.height;  // 650
const MID = H / 2;
const MEM_TOP = MID - 22;
const MEM_BOT = MID + 22;

const PUMP_X = 360;
const NA_CHANNEL_X = 850;
const K_CHANNEL_X = 1220;
const CHANNEL_HALF_W = 52;

// colors
const C_NA = '#ff7a6b';
const C_NA_GLOW = 'rgba(255, 122, 107,';
const C_K = '#5cc9ff';
const C_K_GLOW = 'rgba(92, 201, 255,';
const C_PROT = '#b084ff';
const C_PROT_GLOW = 'rgba(176, 132, 255,';
const C_ATP = '#ffd166';
const C_AMBER = '#d4a554';
const C_ACCENT = '#6ee7e5';

// =====================================================
//  Ion — with motion trail
// =====================================================
class Ion {
  constructor(type, x, y, region) {
    this.type = type;
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = (Math.random() - 0.5) * 0.6;
    this.region = region;
    this.state = 'free';
    this.r = type === 'P' ? 11 : 19;
    this.opacity = 1;
    this.fadeOut = false;
    this.pathFn = null;
    this.pathT = 0;
    this.pathSpeed = 0;
    this.destRegion = null;
    this.trail = [];
    this.wiggle = Math.random() * Math.PI * 2;
  }
  setTransit(pathFn, speed, destRegion) {
    this.state = 'transit';
    this.pathFn = pathFn;
    this.pathT = 0;
    this.pathSpeed = speed;
    this.destRegion = destRegion;
  }
  update(dt) {
    if (this.fadeOut) {
      this.opacity -= 0.02;
      if (this.opacity < 0) this.opacity = 0;
    }
    // record trail
    this.trail.unshift({ x: this.x, y: this.y });
    if (this.trail.length > 8) this.trail.pop();

    if (this.state === 'transit') {
      this.pathT += this.pathSpeed * dt;
      if (this.pathT >= 1) {
        this.pathT = 1;
        this.state = 'free';
        this.region = this.destRegion;
        this.vx = (Math.random() - 0.5) * 1.4;
        this.vy = (Math.random() - 0.5) * 1.4;
      }
      const p = this.pathFn(this.pathT);
      this.x = p.x;
      this.y = p.y;
      return;
    }
    this.wiggle += 0.08;
    const jit = this.type === 'P' ? 0.08 : 0.28;
    this.vx += (Math.random() - 0.5) * jit;
    this.vy += (Math.random() - 0.5) * jit;
    this.vx *= 0.93;
    this.vy *= 0.93;
    const cap = this.type === 'P' ? 0.6 : 1.8;
    const sp = Math.hypot(this.vx, this.vy);
    if (sp > cap) { this.vx = this.vx / sp * cap; this.vy = this.vy / sp * cap; }
    this.x += this.vx;
    this.y += this.vy;
    if (this.region === 'outside') {
      if (this.y > MEM_TOP - this.r - 6) { this.y = MEM_TOP - this.r - 6; this.vy = -Math.abs(this.vy); }
      if (this.y < 40) { this.y = 40; this.vy = Math.abs(this.vy); }
    } else if (this.region === 'inside') {
      if (this.y < MEM_BOT + this.r + 6) { this.y = MEM_BOT + this.r + 6; this.vy = Math.abs(this.vy); }
      if (this.y > H - 40) { this.y = H - 40; this.vy = -Math.abs(this.vy); }
    }
    if (this.x < 40) { this.x = 40; this.vx = Math.abs(this.vx); }
    if (this.x > W - 40) { this.x = W - 40; this.vx = -Math.abs(this.vx); }
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    if (this.type === 'P') {
      // small dim anion marker — NOT a big actor
      ctx.fillStyle = 'rgba(120, 90, 170, 0.55)';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(200, 170, 255, 0.25)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '600 11px -apple-system, system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('−', this.x, this.y);
      ctx.restore();
      return;
    }
    const core = this.type === 'Na' ? C_NA : C_K;
    const glowFn = this.type === 'Na' ? C_NA_GLOW : C_K_GLOW;
    // trail
    for (let i = this.trail.length - 1; i > 0; i--) {
      const p = this.trail[i];
      const a = (1 - i / this.trail.length) * 0.18;
      ctx.fillStyle = glowFn + a + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, this.r * 0.85, 0, Math.PI * 2);
      ctx.fill();
    }
    // outer glow
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 2.6);
    g.addColorStop(0, glowFn + '0.55)');
    g.addColorStop(0.4, glowFn + '0.25)');
    g.addColorStop(1, glowFn + '0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 2.6, 0, Math.PI * 2);
    ctx.fill();
    // core gradient
    const cg = ctx.createRadialGradient(this.x - this.r * 0.3, this.y - this.r * 0.3, 0, this.x, this.y, this.r);
    cg.addColorStop(0, 'rgba(255,255,255,0.9)');
    cg.addColorStop(0.25, core);
    cg.addColorStop(1, core);
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.font = '600 16px -apple-system, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.type === 'Na' ? 'Na⁺' : 'K⁺', this.x, this.y + 1);
    ctx.restore();
  }
}

// =====================================================
//  State
// =====================================================
let ions = [];
let animT = 0;
let currentSceneIdx = 0;
let gates = { na: 0, k: 0 };
let gateTargets = { na: 0, k: 0 };
let channelState = { naInactivated: false, kState: 'closed' }; // kState: closed | open | closing
let sceneLocal = {};
let sceneFadeT = 0;
const damage = 0; // kept for legacy render paths; disease simulations live in the demyelination app
let antibodies = []; // floating antibody visuals

function clearField() {
  ions = [];
  gates = { na: 0, k: 0 };
  gateTargets = { na: 0, k: 0 };
  channelState = { naInactivated: false, kState: 'closed' };
  sceneLocal = {};
}

// =====================================================
//  Drawing helpers
// =====================================================
function drawBackground(ctx) {
  // outside: stronger cyan wash (positive zone)
  const outG = ctx.createLinearGradient(0, 0, 0, MEM_TOP);
  outG.addColorStop(0, 'rgba(92, 201, 255, 0.18)');
  outG.addColorStop(1, 'rgba(92, 201, 255, 0.04)');
  ctx.fillStyle = outG;
  ctx.fillRect(0, 0, W, MEM_TOP);
  // inside: stronger violet wash (negative zone)
  const inG = ctx.createLinearGradient(0, MEM_BOT, 0, H);
  inG.addColorStop(0, 'rgba(176, 132, 255, 0.05)');
  inG.addColorStop(1, 'rgba(176, 132, 255, 0.22)');
  ctx.fillStyle = inG;
  ctx.fillRect(0, MEM_BOT, W, H - MEM_BOT);
}

function drawMembrane(ctx) {
  // two soft amber bands representing lipid bilayer, no polka dots
  const topG = ctx.createLinearGradient(0, MEM_TOP - 12, 0, MEM_TOP + 12);
  topG.addColorStop(0, 'rgba(212, 165, 84, 0)');
  topG.addColorStop(0.5, 'rgba(212, 165, 84, 0.65)');
  topG.addColorStop(1, 'rgba(212, 165, 84, 0.15)');
  ctx.fillStyle = topG;
  ctx.fillRect(0, MEM_TOP - 12, W, 24);

  // middle tails
  ctx.fillStyle = 'rgba(212, 165, 84, 0.08)';
  ctx.fillRect(0, MEM_TOP + 8, W, MEM_BOT - MEM_TOP - 16);

  const botG = ctx.createLinearGradient(0, MEM_BOT - 12, 0, MEM_BOT + 12);
  botG.addColorStop(0, 'rgba(212, 165, 84, 0.15)');
  botG.addColorStop(0.5, 'rgba(212, 165, 84, 0.65)');
  botG.addColorStop(1, 'rgba(212, 165, 84, 0)');
  ctx.fillStyle = botG;
  ctx.fillRect(0, MEM_BOT - 12, W, 24);

  // subtle highlight lines
  ctx.strokeStyle = 'rgba(255, 220, 170, 0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, MEM_TOP);
  ctx.lineTo(W, MEM_TOP);
  ctx.moveTo(0, MEM_BOT);
  ctx.lineTo(W, MEM_BOT);
  ctx.stroke();
}

function drawSideLabels(ctx) {
  ctx.save();
  // OUTSIDE — cyan, bold, prominent at top
  ctx.font = '700 26px -apple-system, system-ui';
  ctx.fillStyle = 'rgba(92, 201, 255, 0.85)';
  ctx.textAlign = 'left';
  ctx.fillText('OUTSIDE OF NEURON', 36, 44);
  ctx.font = '500 14px -apple-system, system-ui';
  ctx.fillStyle = 'rgba(92, 201, 255, 0.55)';
  ctx.fillText('(high Na⁺ · positive)', 36, 68);
  // INSIDE — violet, bold, prominent at bottom
  ctx.font = '700 26px -apple-system, system-ui';
  ctx.fillStyle = 'rgba(176, 132, 255, 0.9)';
  ctx.fillText('INSIDE OF NEURON', 36, H - 46);
  ctx.font = '500 14px -apple-system, system-ui';
  ctx.fillStyle = 'rgba(176, 132, 255, 0.6)';
  ctx.fillText('(high K⁺ + locked P⁻ · negative)', 36, H - 22);
  ctx.restore();
}

function drawChargeMarks(ctx, outsideSign, insideSign) {
  ctx.save();
  ctx.font = '700 38px -apple-system, system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = outsideSign === '+' ? 'rgba(255, 122, 107, 0.35)' : 'rgba(92, 201, 255, 0.35)';
  for (let x = 140; x < W; x += 220) ctx.fillText(outsideSign, x, MEM_TOP - 38);
  ctx.fillStyle = insideSign === '-' ? 'rgba(176, 132, 255, 0.4)' : 'rgba(255, 122, 107, 0.35)';
  for (let x = 140; x < W; x += 220) ctx.fillText(insideSign, x, MEM_BOT + 38);
  ctx.restore();
}

// pump: clean capsule with spinning ATP rotor
function drawPump(ctx, t, opts = {}) {
  const cx = PUMP_X, cy = MID;
  ctx.save();
  // damage dims the pump
  if (damage > 0) ctx.globalAlpha = Math.max(0.15, 1 - damage * 0.75);
  // capsule body
  const bw = 70, bh = 110;
  const grad = ctx.createLinearGradient(cx - bw, cy - bh, cx + bw, cy + bh);
  grad.addColorStop(0, 'rgba(110, 231, 229, 0.18)');
  grad.addColorStop(1, 'rgba(52, 110, 130, 0.35)');
  ctx.fillStyle = grad;
  roundRect(ctx, cx - bw/2, cy - bh, bw, bh * 2, 32);
  ctx.fill();
  ctx.strokeStyle = 'rgba(110, 231, 229, 0.55)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // ATP rotor
  const spin = t / 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(spin);
  // glow
  const rg = ctx.createRadialGradient(0, 0, 0, 0, 0, 38);
  rg.addColorStop(0, 'rgba(255, 209, 102, 0.6)');
  rg.addColorStop(1, 'rgba(255, 209, 102, 0)');
  ctx.fillStyle = rg;
  ctx.beginPath(); ctx.arc(0, 0, 38, 0, Math.PI * 2); ctx.fill();
  // core
  ctx.fillStyle = C_ATP;
  ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.fill();
  // subtle spokes
  ctx.strokeStyle = 'rgba(255, 190, 80, 0.7)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 3; i++) {
    const a = (i * Math.PI * 2) / 3;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * 8, Math.sin(a) * 8);
    ctx.lineTo(Math.cos(a) * 18, Math.sin(a) * 18);
    ctx.stroke();
  }
  ctx.restore();
  // ATP label
  ctx.fillStyle = 'rgba(42, 26, 0, 0.85)';
  ctx.font = '700 12px -apple-system, system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ATP', cx, cy);
  // lower label
  if (opts.showLabel !== false) {
    ctx.fillStyle = 'rgba(159, 176, 202, 0.55)';
    ctx.font = '500 13px -apple-system, system-ui';
    ctx.fillText('Na / K pump', cx, cy + bh + 24);
  }
  ctx.restore();
  // damage overlay (outside the alpha-dimmed save block so it stays strong)
  if (damage > 0.15) {
    drawDamageMark(ctx, cx, cy, 40, Math.min(1, (damage - 0.1) * 1.4));
  }
}

// rounded rect
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// pump paths
function lerp(a, b, t) { return a + (b - a) * t; }
function pumpInToOut(p) {
  const cx = PUMP_X, cy = MID;
  if (p < 0.5) {
    const s = p / 0.5;
    return { x: cx + lerp(-30, 0, s), y: cy + lerp(85, 0, s) };
  } else {
    const s = (p - 0.5) / 0.5;
    return { x: cx + lerp(0, 30, s), y: cy + lerp(0, -85, s) };
  }
}
function pumpOutToIn(p) {
  const cx = PUMP_X, cy = MID;
  if (p < 0.5) {
    const s = p / 0.5;
    return { x: cx + lerp(30, 0, s), y: cy + lerp(-85, 0, s) };
  } else {
    const s = (p - 0.5) / 0.5;
    return { x: cx + lerp(0, -30, s), y: cy + lerp(0, 85, s) };
  }
}

// voltage-gated channel: two curved lips
// opts: { status, inactivated, locked, slowClose }
function drawChannel(ctx, x, openness, ionColor, label, opts) {
  opts = opts || {};
  const { status, inactivated, locked, slowClose } = opts;
  const forcedShut = inactivated || locked;
  const lockColor = inactivated ? 'rgba(255, 180, 100, 0.95)' : ionColor;
  ctx.save();
  if (damage > 0) ctx.globalAlpha = Math.max(0.2, 1 - damage * 0.7);

  // pore base (inactivated channels get desaturated)
  const baseG = ctx.createLinearGradient(x - CHANNEL_HALF_W, 0, x + CHANNEL_HALF_W, 0);
  if (inactivated) {
    baseG.addColorStop(0, 'rgba(35, 40, 55, 0.95)');
    baseG.addColorStop(0.5, 'rgba(22, 26, 38, 0.98)');
    baseG.addColorStop(1, 'rgba(35, 40, 55, 0.95)');
  } else {
    baseG.addColorStop(0, 'rgba(20, 30, 55, 0.9)');
    baseG.addColorStop(0.5, 'rgba(10, 18, 35, 0.95)');
    baseG.addColorStop(1, 'rgba(20, 30, 55, 0.9)');
  }
  ctx.fillStyle = baseG;
  roundRect(ctx, x - CHANNEL_HALF_W, MEM_TOP - 14, CHANNEL_HALF_W * 2, MEM_BOT - MEM_TOP + 28, 10);
  ctx.fill();
  ctx.strokeStyle = inactivated
    ? 'rgba(255, 180, 100, 0.55)'
    : (openness > 0.3 ? ionColor : 'rgba(159, 176, 202, 0.3)');
  ctx.lineWidth = inactivated ? 2.5 : 2;
  if (inactivated) {
    ctx.setLineDash([4, 3]);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // ion color glow when open (none if inactivated)
  if (openness > 0.15 && !inactivated) {
    const gh = (MEM_BOT - MEM_TOP + 16) * openness;
    const yTop = MEM_TOP - 8 + (MEM_BOT - MEM_TOP + 16 - gh) / 2;
    ctx.save();
    ctx.globalAlpha = 0.2 + openness * 0.3;
    ctx.fillStyle = ionColor;
    roundRect(ctx, x - CHANNEL_HALF_W + 8, yTop, CHANNEL_HALF_W * 2 - 16, gh, 6);
    ctx.fill();
    ctx.restore();
  }

  // gates (two lip flaps). Locked = forced fully shut. Inactivated = shut + desaturated.
  const gateH = 28;
  const effectiveOpenness = forcedShut ? 0 : openness;
  const gap = effectiveOpenness * 22;
  ctx.fillStyle = inactivated
    ? 'rgba(120, 110, 130, 0.75)'
    : (locked ? 'rgba(100, 140, 170, 0.9)' : ionColor);
  // top gate
  roundRect(ctx, x - CHANNEL_HALF_W + 12, MEM_TOP - 10, CHANNEL_HALF_W * 2 - 24, gateH - gap, 4);
  ctx.fill();
  // bottom gate
  roundRect(ctx, x - CHANNEL_HALF_W + 12, MEM_BOT + 10 - (gateH - gap), CHANNEL_HALF_W * 2 - 24, gateH - gap, 4);
  ctx.fill();

  // Padlock icon when inactivated or locked
  if (forcedShut) {
    const cy = MID;
    const bodyW = 16, bodyH = 12;
    const shackleR = 6;
    ctx.save();
    ctx.strokeStyle = lockColor;
    ctx.lineWidth = 2.3;
    ctx.beginPath();
    ctx.arc(x, cy - bodyH / 2 - 1, shackleR, Math.PI, 0, false);
    ctx.stroke();
    ctx.fillStyle = lockColor;
    roundRect(ctx, x - bodyW / 2, cy - bodyH / 2 + 5, bodyW, bodyH, 2.5);
    ctx.fill();
    ctx.fillStyle = 'rgba(20, 22, 30, 0.9)';
    ctx.beginPath();
    ctx.arc(x, cy + 6, 1.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // "closing slowly" trailing chevrons for K
  if (slowClose && openness < 0.75 && openness > 0.05) {
    ctx.save();
    ctx.strokeStyle = 'rgba(92, 201, 255, 0.55)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    // tiny double-down chevrons on top and bottom indicating gradual closing
    const cy1 = MEM_TOP - 18;
    const cy2 = MEM_BOT + 18;
    ctx.moveTo(x - 5, cy1);
    ctx.lineTo(x, cy1 + 3);
    ctx.lineTo(x + 5, cy1);
    ctx.moveTo(x - 5, cy2);
    ctx.lineTo(x, cy2 - 3);
    ctx.lineTo(x + 5, cy2);
    ctx.stroke();
    ctx.restore();
  }

  // label, voltage-gated subtitle, status
  if (label) {
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(159, 176, 202, 0.55)';
    ctx.font = '500 13px -apple-system, system-ui';
    ctx.fillText(label, x, MEM_BOT + 80);

    ctx.fillStyle = 'rgba(159, 176, 202, 0.35)';
    ctx.font = '700 9px -apple-system, system-ui';
    ctx.fillText('VOLTAGE-GATED', x, MEM_BOT + 94);

    // status priority: INACTIVATED > LOCKED > status override > CLOSING SLOWLY > OPEN > CLOSED
    let statusText;
    let statusColor;
    if (inactivated) {
      statusText = 'INACTIVATED';
      statusColor = 'rgba(255, 180, 100, 0.95)';
    } else if (locked) {
      statusText = 'LOCKED CLOSED';
      statusColor = ionColor;
    } else if (status) {
      statusText = status;
      statusColor = openness > 0.5 ? ionColor : 'rgba(159, 176, 202, 0.7)';
    } else if (slowClose && openness < 0.85 && openness > 0.05) {
      statusText = 'CLOSING SLOWLY';
      statusColor = 'rgba(92, 201, 255, 0.9)';
    } else if (openness > 0.5) {
      statusText = 'OPEN';
      statusColor = ionColor;
    } else {
      statusText = 'CLOSED';
      statusColor = 'rgba(159, 176, 202, 0.5)';
    }
    ctx.fillStyle = statusColor;
    ctx.font = '700 12px -apple-system, system-ui';
    ctx.fillText(statusText, x, MEM_BOT + 110);
  }
  ctx.restore();
}

// Compact horizontal voltage meter used by the repolarize+refractory scene.
// Has a dashed Resting line at -70 so students can clearly see the dip.
function drawLocalVoltageMeter(ctx, cx, cy, v) {
  const w = 260;
  const x0 = cx - w / 2;
  const x1 = cx + w / 2;
  const vMin = -95, vMax = 50;
  const toX = mv => x0 + ((mv - vMin) / (vMax - vMin)) * w;

  ctx.save();

  // axis line
  ctx.strokeStyle = 'rgba(255,255,255,0.28)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x0, cy);
  ctx.lineTo(x1, cy);
  ctx.stroke();

  // dashed vertical reference line at resting -70 so the dip is unmistakable
  const rx = toX(-70);
  ctx.strokeStyle = 'rgba(110, 231, 229, 0.55)';
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(rx, cy - 18);
  ctx.lineTo(rx, cy + 18);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(110, 231, 229, 0.85)';
  ctx.font = '600 10px -apple-system, system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('rest −70', rx, cy + 20);

  // edge labels
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '500 10px -apple-system, system-ui';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText('−90', x0 + 2, cy + 20);
  ctx.textAlign = 'right';
  ctx.fillText('+40', x1 - 2, cy + 20);

  // tick marks
  [-90, -70, 0, 40].forEach(mv => {
    const tx = toX(mv);
    ctx.strokeStyle = mv === -70 ? 'rgba(110, 231, 229, 0.7)' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = mv === -70 ? 1.5 : 1;
    ctx.beginPath();
    ctx.moveTo(tx, cy - 3);
    ctx.lineTo(tx, cy + 3);
    ctx.stroke();
  });

  // current voltage marker
  const vx = toX(v);
  const isHyper = v < -71;
  const fill = isHyper ? '#b084ff' : (v > -40 ? '#ff7a6b' : '#5cc9ff');
  ctx.fillStyle = fill;
  ctx.shadowColor = fill;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(vx, cy, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // inner white core
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(vx, cy, 2.3, 0, Math.PI * 2);
  ctx.fill();

  // voltage numeric above the dot
  ctx.fillStyle = fill;
  ctx.font = '700 13px -apple-system, system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(Math.round(v) + ' mV', vx, cy - 10);

  // HYPERPOLARIZED callout when below resting
  if (isHyper) {
    ctx.fillStyle = 'rgba(176, 132, 255, 0.95)';
    ctx.font = '700 10px -apple-system, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('HYPERPOLARIZED ↓', vx, cy - 26);
  }

  ctx.restore();
}

function channelPath(x, fromRegion, toRegion) {
  return (p) => {
    let y;
    if (fromRegion === 'outside') y = lerp(MEM_TOP - 60, MEM_BOT + 60, p);
    else y = lerp(MEM_BOT + 60, MEM_TOP - 60, p);
    return { x: x + Math.sin(p * Math.PI) * 3, y };
  };
}

// Helpers for realistic neuron
function seededRng(seed) {
  let s = seed;
  return function() { s = (s * 16807) % 2147483647; return s / 2147483647; };
}
function buildDendriteTree(x0, y0, angle, length, depth, rng, segments = []) {
  if (depth === 0 || length < 18) return segments;
  const endX = x0 + Math.cos(angle) * length;
  const endY = y0 + Math.sin(angle) * length;
  const cpX = x0 + Math.cos(angle) * length * 0.5 + (rng() - 0.5) * 30;
  const cpY = y0 + Math.sin(angle) * length * 0.5 + (rng() - 0.5) * 30;
  segments.push({ x1: x0, y1: y0, cx: cpX, cy: cpY, x2: endX, y2: endY, w: depth * 2 });
  const branchAngle = 0.45 + rng() * 0.3;
  const lenScale = 0.6 + rng() * 0.15;
  buildDendriteTree(endX, endY, angle - branchAngle, length * lenScale, depth - 1, rng, segments);
  buildDendriteTree(endX, endY, angle + branchAngle, length * lenScale, depth - 1, rng, segments);
  if (rng() > 0.6) {
    buildDendriteTree(endX, endY, angle + (rng() - 0.5) * 0.3, length * 0.5, depth - 1, rng, segments);
  }
  return segments;
}

// 9. Propagation — Na⁺ pushes until it TRIGGERS the next gate
const scenePropagation = {
  phase: 'Step 11: Propagation',
  phaseColor: '#ff7a6b',

  graphIdx: 3,
  notes: "The Na⁺ that rushed in is <strong>stuck</strong>. It cannot cross back (Na⁺ gates on this patch are locked) and it cannot leak through the membrane. Because it is all positive, it <strong>repels itself sideways</strong> toward the next patch. Watch it drift right. When the wave of Na⁺ reaches the <strong>next patch's gate</strong>, the voltage there crosses <strong>threshold</strong> and that gate <strong>TRIGGERS OPEN</strong>. Na⁺ rushes in. The process <strong>repeats</strong> one patch down. That is how the action potential travels.",
  setup() {
    clearField();
    // This patch: fired, Na+ inside, refractory
    for (let i = 0; i < 14; i++) {
      ions.push(new Ion('Na', 200 + i * 50, MEM_BOT + 80 + Math.random() * 160, 'inside'));
    }
    // Background Na+ pool outside (left side, thinner)
    for (let i = 0; i < 6; i++) {
      ions.push(new Ion('Na', 80 + i * 110, MEM_TOP - 80 - Math.random() * 120, 'outside'));
    }
    // Dense pool of Na+ clustered right above the NEXT patch — ready to rush in when triggered
    for (let i = 0; i < 18; i++) {
      ions.push(new Ion('Na', K_CHANNEL_X - 140 + Math.random() * 280, MEM_TOP - 70 - Math.random() * 150, 'outside'));
    }
    for (let i = 0; i < 6; i++) {
      ions.push(new Ion('P', 150 + i * 150, MEM_BOT + 200 + Math.random() * 130, 'inside'));
    }

    gates = { na: 0, k: 0 };
    gateTargets = { na: 0, k: 0 };

      push: 0,
      rushed: 0,
      triggered: false,
      triggerAt: 0,
      flash: 0,
      closingAt: 0,
      nextPatchInactivated: false,
      burstFired: false,
    };
  },
  update(dt) {
    // Na+ inside drifts rightward
    sceneLocal.push += dt;
    ions.filter(i => i.type === 'Na' && i.region === 'inside' && i.state === 'free').forEach(i => {
      i.vx += 0.08;
    });

    // Trigger: any inside Na+ ion reaches the threshold zone of the next gate
    if (!sceneLocal.triggered) {
      const reached = ions.some(i =>
        i.type === 'Na' && i.region === 'inside' && i.state === 'free' && i.x > K_CHANNEL_X - 80
      );
      if (reached) {
        sceneLocal.triggered = true;
        sceneLocal.triggerAt = animT;
        sceneLocal.flash = 1;
        gateTargets.na = 1; // fire the next patch
      }
    }

    // Post-trigger timing: open fast, hold briefly, then close + inactivate
    if (sceneLocal.triggered) {
      const sinceTrigger = animT - sceneLocal.triggerAt;
      if (sinceTrigger > 2400 && !sceneLocal.closingAt) {
        sceneLocal.closingAt = animT;
        gateTargets.na = 0;
      }
      if (sceneLocal.closingAt && gates.na < 0.35) {
        sceneLocal.nextPatchInactivated = true;
      }
    }

    // Fast gate dynamics (Na+ is a fast channel)
    gates.na += (gateTargets.na - gates.na) * 0.22;

    // Flash decays
    sceneLocal.flash = Math.max(0, sceneLocal.flash - dt / 900);

      const cands = ions.filter(i => i.type === 'Na' && i.region === 'outside' && i.state === 'free' && Math.abs(i.x - K_CHANNEL_X) < 260);

      cands.slice(0, 8).forEach((ion, idx) => {
        const speed = 0.0022 + Math.random() * 0.0008 - idx * 0.00005;
        ion.setTransit(channelPath(K_CHANNEL_X, 'outside', 'inside'), speed, 'inside');

    }

    sceneLocal.rushed += dt;

    }

  },
  draw(ctx, t) {

    if (sceneLocal.flash > 0) {

      flashGrad.addColorStop(0, `rgba(255, 209, 102, ${a})`);

    drawChannel(ctx, NA_CHANNEL_X, 0, C_NA, 'this patch (refractory)', { status: 'LOCKED', inactivated: true });

    let nextStatus;

    drawChannel(ctx, K_CHANNEL_X, gates.na, C_NA, 'NEXT patch (Na⁺)', {
      status: nextStatus,
      inactivated: sceneLocal.nextPatchInactivated,
    });

    ions.forEach(i => i.draw(ctx));
    drawSideLabels(ctx);

    // Banner text evolves with the story
    ctx.save();
    ctx.font = '700 22px -apple-system, system-ui';
    ctx.textAlign = 'center';
    if (!sceneLocal.triggered) {
      ctx.fillStyle = 'rgba(255, 122, 107, 0.95)';
      ctx.fillText('Na⁺ pushes → toward the next gate', W / 2, 70);
    } else if (!sceneLocal.nextPatchInactivated) {
      ctx.fillStyle = 'rgba(255, 209, 102, 0.98)';

      ctx.fillStyle = 'rgba(110, 231, 229, 0.95)';
      ctx.fillText('→ the process repeats at the next patch → the signal travels on →', W / 2, 70);
    }
    ctx.restore();

    // Push arrow — only before trigger
    if (!sceneLocal.triggered) {
      ctx.save();
      ctx.fillStyle = 'rgba(255, 122, 107, 0.8)';
      ctx.font = '600 16px -apple-system, system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('Na⁺ builds up and pushes →', (NA_CHANNEL_X + K_CHANNEL_X) / 2, H - 100);
      const bob = Math.sin(t / 300) * 6;
      ctx.strokeStyle = 'rgba(255, 122, 107, 0.85)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(NA_CHANNEL_X + 80 + bob, H - 150);

    }
  }

const markerPoints = [
  { x: 30,  mv: -70 }, // 0: why-negative
  { x: 60,  mv: -70 }, // 1: resting
  { x: 100, mv: -55 }, // 2: threshold
  { x: 140, mv: 30 },  // 3: depolarize
  { x: 190, mv: -70 }, // 4: repolarize
  { x: 220, mv: -80 }, // 5: refractory
];
function renderMinigraph(activeIdx) {
  minigraph.innerHTML = "";
  const svgNS = "http://www.w3.org/2000/svg";
  // axis baseline
  const axis = document.createElementNS(svgNS, "line");
  axis.setAttribute("x1", 10); axis.setAttribute("y1", gH - 10);
  axis.setAttribute("x2", gW - 4); axis.setAttribute("y2", gH - 10);
  axis.setAttribute("stroke", "rgba(159, 176, 202, 0.15)");
  axis.setAttribute("stroke-width", "1");
  minigraph.appendChild(axis);
  // resting reference
  const rest = document.createElementNS(svgNS, "line");
  rest.setAttribute("x1", 10); rest.setAttribute("y1", mvToMiniY(-70));
  rest.setAttribute("x2", gW - 4); rest.setAttribute("y2", mvToMiniY(-70));
  rest.setAttribute("stroke", "rgba(110, 231, 229, 0.3)");
  rest.setAttribute("stroke-width", "1");
  rest.setAttribute("stroke-dasharray", "3,4");
  minigraph.appendChild(rest);
  // threshold reference
  const thr = document.createElementNS(svgNS, "line");
  thr.setAttribute("x1", 10); thr.setAttribute("y1", mvToMiniY(-55));
  thr.setAttribute("x2", gW - 4); thr.setAttribute("y2", mvToMiniY(-55));
  thr.setAttribute("stroke", "rgba(255, 209, 102, 0.25)");
  thr.setAttribute("stroke-width", "1");
  thr.setAttribute("stroke-dasharray", "3,4");
  minigraph.appendChild(thr);
  if (activeIdx != null && activeIdx >= 0) {
    const pts = markerPoints.slice(0, activeIdx + 1);
    const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${mvToMiniY(p.mv)}`).join(' ');
    const path = document.createElementNS(svgNS, "path");
    path.setAttribute("d", d);
    path.setAttribute("stroke", "#6ee7e5");
    path.setAttribute("stroke-width", "2.5");
    path.setAttribute("fill", "none");
    path.setAttribute("stroke-linecap", "round");
    path.setAttribute("stroke-linejoin", "round");
    minigraph.appendChild(path);
    const cur = pts[pts.length - 1];
    // glow dot
    const glow = document.createElementNS(svgNS, "circle");
    glow.setAttribute("cx", cur.x); glow.setAttribute("cy", mvToMiniY(cur.mv));
    glow.setAttribute("r", 10);
    glow.setAttribute("fill", "rgba(110, 231, 229, 0.3)");
    minigraph.appendChild(glow);
    const dot = document.createElementNS(svgNS, "circle");
    dot.setAttribute("cx", cur.x); dot.setAttribute("cy", mvToMiniY(cur.mv));
    dot.setAttribute("r", 4); dot.setAttribute("fill", "#6ee7e5");
    minigraph.appendChild(dot);
  }
}

// =====================================================
//  UI
// =====================================================
const phaseNameEl = document.getElementById("phaseName");
const voltageEl = document.getElementById("voltage");
const notesEl = document.getElementById("notes");
const stepHeadingEl = document.getElementById("stepHeading");
const sketchPromptEl = document.getElementById("sketchPrompt");
const stepIndicator = document.getElementById("stepIndicator");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const resetBtn = document.getElementById("resetBtn");

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function setScene(i) {
  currentSceneIdx = i;
  animT = 0;
  sceneFadeT = 0;
  const s = scenes[i];
  if (s.setup) s.setup();
  phaseNameEl.textContent = s.phase;
  phaseNameEl.style.color = s.phaseColor;
  if (s.voltage == null) {
    voltageEl.classList.add("hidden");
  } else {
    voltageEl.classList.remove("hidden");
    voltageEl.textContent = (s.voltage > 0 ? '+' : '') + s.voltage + ' mV';
  }
  notesEl.innerHTML = s.notes;
  stepHeadingEl.textContent = s.phase;
  sketchPromptEl.innerHTML = s.sketchPrompt
    || "<span class=\"pen\">✎</span>Now sketch a quick diagram of what you see above. Use color where it helps.";
  stepIndicator.textContent = `${pad2(i + 1)} / ${pad2(scenes.length)}`;
  prevBtn.disabled = i === 0;
  nextBtn.disabled = i === scenes.length - 1;
  nextBtn.textContent = i === scenes.length - 1 ? 'Done' : 'Next →';
  renderMinigraph(s.graphIdx);
  if (s.graphIdx == null) graphWrap.classList.add("hidden");
  else graphWrap.classList.remove("hidden");

  // Wire up the phase-card click-to-reveal on the summary scene
  if (i === scenes.length - 1) initPhaseBreakdown();
}

function initPhaseBreakdown() {
  const cards = document.querySelectorAll('.phase-card');
  const fill = document.getElementById('pbFill');
  const text = document.getElementById('pbText');
  if (!cards.length) return;
  const total = cards.length;
  cards.forEach(card => {
    card.addEventListener('click', () => {
      if (card.classList.contains('revealed')) return;
      card.classList.add('revealed');
      const done = document.querySelectorAll('.phase-card.revealed').length;
      if (fill) fill.style.width = (done / total * 100) + '%';
      if (text) {
        if (done === total) {
          text.textContent = `✓ All ${total} phases explored`;
          text.classList.add('complete');
        } else {
          text.textContent = `${done} of ${total} phases revealed`;
        }
      }
    });
  });
}

prevBtn.addEventListener("click", () => { if (currentSceneIdx > 0) setScene(currentSceneIdx - 1); });
nextBtn.addEventListener("click", () => { if (currentSceneIdx < scenes.length - 1) setScene(currentSceneIdx + 1); });
resetBtn.addEventListener("click", () => setScene(0));
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" && currentSceneIdx < scenes.length - 1) setScene(currentSceneIdx + 1);
  if (e.key === "ArrowLeft" && currentSceneIdx > 0) setScene(currentSceneIdx - 1);
});

// Damage helpers — draw X mark / cracks on a point (currently unused — damage === 0)
function drawDamageMark(ctx, x, y, size, alpha) {
  ctx.save();
  ctx.strokeStyle = `rgba(255, 92, 92, ${alpha})`;
  ctx.lineWidth = Math.max(2, size * 0.12);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - size, y - size);
  ctx.lineTo(x + size, y + size);
  ctx.moveTo(x - size, y + size);
  ctx.lineTo(x + size, y - size);
  ctx.stroke();
  ctx.restore();
}

function drawAntibodies(ctx, t) {
  if (damage < 0.05) return;
  const count = Math.floor(damage * 14);
  for (let i = 0; i < count; i++) {
    const seed = i * 97.13;
    const x = ((Math.sin(seed) * 0.5 + 0.5) * W + (t / 40 + i * 60)) % W;
    const yRegion = (i % 2 === 0) ? MEM_TOP - 40 - (i * 13 % 80) : MEM_BOT + 40 + (i * 17 % 80);
    const yBob = Math.sin(t / 500 + i) * 6;
    const y = yRegion + yBob;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.sin(t / 700 + i) * 0.3);
    ctx.strokeStyle = `rgba(255, 92, 92, ${0.45 + damage * 0.35})`;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    // Y shape — antibody
    ctx.beginPath();
    ctx.moveTo(0, 8);
    ctx.lineTo(0, -2);
    ctx.moveTo(0, -2);
    ctx.lineTo(-6, -10);
    ctx.moveTo(0, -2);
    ctx.lineTo(6, -10);
    ctx.stroke();
    ctx.restore();
  }
}

// =====================================================
//  Main loop
// =====================================================
let lastTs = null;
function tick(ts) {
  if (lastTs == null) lastTs = ts;
  const dt = Math.min(50, ts - lastTs);
  lastTs = ts;
  animT += dt;
  sceneFadeT = Math.min(1, sceneFadeT + dt / 600);
  const s = scenes[currentSceneIdx];
  if (s.update) s.update(dt);
  // Live voltage readout for scenes with an animated voltage (e.g., Step 10)
  if (s.dynamicVoltage && sceneLocal && typeof sceneLocal.localV === 'number') {
    const v = Math.round(sceneLocal.localV);
    voltageEl.textContent = (v > 0 ? '+' : '') + v + ' mV';
  }
  // clear with subtle vignette
  ctx.save();
  ctx.fillStyle = '#05070f';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = sceneFadeT;
  s.draw(ctx, animT);
  ctx.restore();
  // antibodies float above everything when damage > 0
  drawAntibodies(ctx, animT);
  requestAnimationFrame(tick);
}

setScene(0);
requestAnimationFrame(tick);
</script>
